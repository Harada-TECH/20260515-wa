<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>演習：プロフィールカード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="card">
      <h1>{{ name }}</h1>
      <p><span>専攻：</span>{{ course }}</p>
      <p><span>趣味：</span>{{ hobby }}</p>
      <p><span>好きな食べ物：</span>{{ food }}</p>
      <p><span class="message">メッセージ：</span>{{ message }}</p>
    </div>
  </div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>

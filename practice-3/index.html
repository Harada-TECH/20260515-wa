<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>演習：計算式表示</title>
</head>
<body>
  <div id="app">
    <p>10 + 20 = {{ 10 + 20 }}</p>

    <p>
      {{ item }}：
      {{ price }}円 ×
      {{ quantity }}個
      ＝
      {{ price * quantity }}円
    </p>

    <p>税込価格：{{ price * 1.1 }}円</p>
    <p>割引価格：{{ price * 0.8 }}円</p>
  </div>
  
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
